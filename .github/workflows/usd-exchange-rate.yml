name: Daily USD Exchange Rate Alert

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  send-exchange-rate:
    runs-on: ubuntu-latest
    
    steps:
    - name: Get USD/KRW Exchange Rate
      id: get_rate
      run: |
        RATE=$(curl -s "https://api.exchangerate-api.com/v4/latest/USD" | jq -r '.rates.KRW')
        echo "rate=$RATE" >> $GITHUB_OUTPUT
        KOREAN_DATE=$(TZ=Asia/Seoul date '+%Y년 %m월 %d일 (%a)')
        echo "date=$KOREAN_DATE" >> $GITHUB_OUTPUT
    
    - name: Send to Slack
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      run: |
        RATE="${{ steps.get_rate.outputs.rate }}"
        DATE="${{ steps.get_rate.outputs.date }}"
        MESSAGE="💵 **USD/KRW 환율 알림**\n\n📅 ${DATE}\n💰 **1 USD = ${RATE} KRW**\n\n_매일 오전 7시 자동 전송됩니다_"
        curl -X POST "$SLACK_WEBHOOK_URL" -H 'Content-Type: application/json' -d "{\"text\":\"$MESSAGE\"}"
