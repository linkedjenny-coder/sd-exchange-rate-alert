name: Daily USD Exchange Rate Alert

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  send-exchange-rate:
    runs-on: ubuntu-latest
    
    steps:
    - name: Get USD/KRW Exchange Rate from Bank of Korea
      id: get_rate
      env:
        BOK_API_KEY: ${{ secrets.BOK_API_KEY }}
      run: |
        TODAY=$(TZ=Asia/Seoul date '+%Y%m%d')
        RESPONSE=$(curl -s "https://ecos.bok.or.kr/api/StatisticSearch/${BOK_API_KEY}/json/kr/1/1/036Y001/DD/${TODAY}/${TODAY}/0000001")
        RATE=$(echo $RESPONSE | jq -r '.StatisticSearch.row[0].DATA_VALUE')
        echo "rate=$RATE" >> $GITHUB_OUTPUT
        KOREAN_DATE=$(TZ=Asia/Seoul date '+%Y년 %m월 %d일 (%a)')
        echo "date=$KOREAN_DATE" >> $GITHUB_OUTPUT
    
    - name: Send to Slack
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      run: |
        RATE="${{ steps.get_rate.outputs.rate }}"
        DATE="${{ steps.get_rate.outputs.date }}"
        MESSAGE="💵 **한국은행 공식 USD 환율**\n\n📅 ${DATE}\n💰 **매매기준율: ${RATE} KRW**\n\n_한국은행 고시환율 / 매일 오전 7시 자동 전송_"
        curl -X POST "$SLACK_WEBHOOK_URL" -H 'Content-Type: application/json' -d "{\"text\":\"$MESSAGE\"}"
