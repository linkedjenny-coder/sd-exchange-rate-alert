name: Daily USD Exchange Rate Alert

on:
  schedule:
    - cron: '10 0 * * *'
  workflow_dispatch:

jobs:
  send-exchange-rate:
    runs-on: ubuntu-latest
    
    steps:
    - name: Get USD/KRW Exchange Rate
      id: get_rate
      run: |
        KOREAN_DATE=$(TZ=Asia/Seoul date '+%Y년 %m월 %d일 (%a)')
        DAY_OF_WEEK=$(TZ=Asia/Seoul date '+%u')
        
        if [ "$DAY_OF_WEEK" -eq 6 ] || [ "$DAY_OF_WEEK" -eq 7 ]; then
          NOTE="(금요일 환율)"
        else
          NOTE=""
        fi
        
        RESPONSE=$(curl -s "https://api.exchangerate.host/latest?base=USD&symbols=KRW")
        RATE=$(echo $RESPONSE | jq -r '.rates.KRW')
        
        # null 체크
        if [ "$RATE" = "null" ] || [ -z "$RATE" ]; then
          RATE="API 오류"
        fi
        
        echo "rate=$RATE" >> $GITHUB_OUTPUT
        echo "date=$KOREAN_DATE" >> $GITHUB_OUTPUT
        echo "note=$NOTE" >> $GITHUB_OUTPUT
    
    - name: Send to Slack
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      run: |
        RATE="${{ steps.get_rate.outputs.rate }}"
        DATE="${{ steps.get_rate.outputs.date }}"
        NOTE="${{ steps.get_rate.outputs.note }}"
        MESSAGE="💵 **USD 환율** ${NOTE}\n\n📅 ${DATE}\n💰 **1 USD = ${RATE} KRW**\n\n_국제 환율 기준 / 매일 오전 9시 10분 자동 전송_"
        curl -X POST "$SLACK_WEBHOOK_URL" -H 'Content-Type: application/json' -d "{\"text\":\"$MESSAGE\"}"
