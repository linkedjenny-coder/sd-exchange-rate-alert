name: Daily USD Exchange Rate Alert

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  send-exchange-rate:
    runs-on: ubuntu-latest
    
    steps:
    - name: Get USD/KRW Exchange Rate from Hana Bank
      id: get_rate
      run: |
        RATE=$(curl -s "https://www.kebhana.com/cms/rate/index.do?contentUrl=/cms/rate/wpfxd651_01i.json" | \
          jq -r '.ExchRate[] | select(.CUR_C=="USD") | .SELL_RTM' | tr -d ',')
        echo "rate=$RATE" >> $GITHUB_OUTPUT
        KOREAN_DATE=$(TZ=Asia/Seoul date '+%Y년 %m월 %d일 (%a)')
        echo "date=$KOREAN_DATE" >> $GITHUB_OUTPUT
    
    - name: Send to Slack
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      run: |
        RATE="${{ steps.get_rate.outputs.rate }}"
        DATE="${{ steps.get_rate.outputs.date }}"
        MESSAGE="💵 **하나은행 USD 환율 (송금 보낼 때)**\n\n📅 ${DATE}\n💰 **1 USD = ${RATE} KRW**\n\n_전신환 매도율 기준 / 매일 오전 7시 자동 전송_"
        curl -X POST "$SLACK_WEBHOOK_URL" -H 'Content-Type: application/json' -d "{\"text\":\"$MESSAGE\"}"
